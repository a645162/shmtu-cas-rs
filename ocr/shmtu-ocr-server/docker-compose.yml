services:
  shmtu-ocr-server:
    build:
      context: ../../../
      dockerfile: ocr/shmtu-ocr-server/Dockerfile
    ports:
      - "21600:21600"
      - "21601:21601"
    volumes:
      - ./models:/app/models
    command: ["shmtu-ocr-server", "--model-dir", "/app/models", "--enable-tcp"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:21600/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

